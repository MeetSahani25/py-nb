name: Daily Screener Report

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 6:00 PM IST Mon-Fri — daily momentum scrape
    - cron: "0 19 * * 1-5"    # 12:30 AM IST Mon-Fri — earnings scanner
  workflow_dispatch:
    inputs:
      earnings_date:
        description: 'Run earnings scanner for specific date (YYYY-MM-DD). Leave empty for last 3 days.'
        required: false
        default: ''
      stock_lookup:
        description: 'Stock history lookup (e.g. "Triveni Turbine"). Leave empty to skip.'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance

      - name: Run daily momentum scraper (6pm run only)
        run: |
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if [ "$HOUR" = "12" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "6pm run — scraping momentum screen..."
            python screener_scraper.py
          else
            echo "Not 6pm run (hour=$HOUR) — skipping momentum scrape"
          fi
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}

      - name: Run earnings scanner (12:30am run + manual)
        run: |
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if [ "$HOUR" = "19" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "12:30am run — scanning quarterly results..."
            if [ -n "${{ github.event.inputs.earnings_date }}" ]; then
              echo "Running for specific date: ${{ github.event.inputs.earnings_date }}"
              python earnings_scanner.py ${{ github.event.inputs.earnings_date }}
            else
              python earnings_scanner.py
            fi
          else
            echo "Not earnings run (hour=$HOUR) — skipping"
          fi
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}

      - name: Run weekly analysis + silent horse (Fridays + manual)
        run: |
          DAY=$(date +'%u')
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if ([ "$DAY" = "5" ] && [ "$HOUR" = "12" ]) || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Friday 6pm — running weekly analysis + silent horse..."
            python weekly_analysis.py
            python silent_horse.py
          else
            echo "Not Friday 6pm — skipping weekly/silent horse"
          fi

      - name: Run cleanup (Fridays 6pm only)
        run: |
          if [ "$(date +'%u')" = "5" ] && [ "$(date +'%H')" = "12" ]; then
            python cleanup.py
          fi

      - name: Send email (Fridays 6pm + manual)
        run: |
          DAY=$(date +'%u')
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if ([ "$DAY" = "5" ] && [ "$HOUR" = "12" ]) || [ "$EVENT" = "workflow_dispatch" ]; then
            python send_email.py
          fi
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

      - name: Stock history lookup
        run: |
          if [ -n "${{ github.event.inputs.stock_lookup }}" ]; then
            echo "Looking up history for: ${{ github.event.inputs.stock_lookup }}"
            python stock_history.py "${{ github.event.inputs.stock_lookup }}"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📈 $(date +'%Y-%m-%d %H:%M') UTC"
          git push
