name: Daily Screener Report

on:
  schedule:
    # 6:00 PM IST = 12:30 UTC, Mon–Fri
    - cron: "30 12 * * 1-5"
  workflow_dispatch:  # manual trigger anytime from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        run: python screener_scraper.py

      - name: Commit & push reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📈 Daily report $(date +'%Y-%m-%d')"
          git push
