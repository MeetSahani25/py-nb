name: Daily Screener Report

on:
  schedule:
    - cron: "30 12 * * 1-4"  # Mon-Thu
    - cron: "30 12 * * 5"    # Friday
    - cron: "0 19 * * 1-5"
  workflow_dispatch:
    inputs:
      earnings_date:
        description: 'Earnings date (YYYY-MM-DD). Leave empty for last 3 days.'
        required: false
        default: ''
      stock_lookup:
        description: 'Stock history lookup (e.g. "Triveni Turbine"). Leave empty to skip.'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance

      - name: Run daily momentum scraper
        # Runs on 6pm cron (12 UTC) OR manual trigger
        run: |
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if [ "$HOUR" = "12" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Running daily momentum scraper..."
            python screener_scraper.py
          else
            echo "Not 6pm run (hour=$HOUR) — skipping momentum scrape"
          fi
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}

      - name: Run earnings scanner
        # Runs on 12:30am cron (19 UTC) OR manual trigger
        run: |
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if [ "$HOUR" = "19" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Running earnings scanner..."
            if [ -n "${{ github.event.inputs.earnings_date }}" ]; then
              python earnings_scanner.py ${{ github.event.inputs.earnings_date }}
            else
              python earnings_scanner.py
            fi
          else
            echo "Not earnings run (hour=$HOUR) — skipping"
          fi
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}

      - name: Run weekly analysis + silent horse
        # Runs on Friday 6pm cron OR manual trigger
        run: |
          DAY=$(date +'%u')
          EVENT="${{ github.event_name }}"
          
          if [ "$DAY" = "5" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Running weekly analysis + silent horse..."
            python weekly_analysis.py
            python silent_horse.py
          else
            echo "Not Friday — skipping weekly/silent horse (day=$DAY)"
          fi
          
      - name: Run cleanup
        # Runs on Friday 6pm only
        run: |
          DAY=$(date +'%u')
          HOUR=$(date +'%H')
          if [ "$DAY" = "5" ] && [ "$HOUR" = "12" ]; then
            echo "Running cleanup..."
            python cleanup.py
          fi

      - name: Stock history lookup
        # Runs only when stock_lookup input is provided
        run: |
          if [ -n "${{ github.event.inputs.stock_lookup }}" ]; then
            echo "Looking up history for: ${{ github.event.inputs.stock_lookup }}"
            python stock_history.py "${{ github.event.inputs.stock_lookup }}"
          fi

      - name: Send email
        # Runs on Friday 6pm cron OR manual trigger — NOT on earnings cron
        run: |
          DAY=$(date +'%u')
          HOUR=$(date +'%H')
          EVENT="${{ github.event_name }}"
          if ([ "$DAY" = "5" ] && [ "$HOUR" = "12" ]) || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Sending email..."
            python send_email.py
          else
            echo "Not email time (day=$DAY hour=$HOUR event=$EVENT) — skipping"
          fi
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          STOCK_LOOKUP: ${{ github.event.inputs.stock_lookup }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📈 $(date +'%Y-%m-%d %H:%M') UTC"
          git push
