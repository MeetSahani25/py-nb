name: Daily Screener Report

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance

      - name: Run daily scraper
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        run: python screener_scraper.py

      - name: Run weekly analysis + cleanup on Fridays
        run: |
          if [ "$(date +'%u')" = "5" ]; then
            echo "📊 Friday — running weekly analysis..."
            python weekly_analysis.py
            echo "🧹 Running cleanup (180 day retention)..."
            python cleanup.py
          else
            echo "📅 $(date +'%A') — skipping weekly analysis"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📈 $(date +'%Y-%m-%d')$([ $(date +'%u') -eq 5 ] && echo ' + weekly analysis' || echo '')"
          git push
