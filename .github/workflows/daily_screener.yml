name: Daily Screener Report

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 6pm IST Mon-Fri — daily scrape
    - cron: "30 4 * * 6"      # 10am IST Saturday — weekly email
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance

      - name: Run daily scraper
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        run: python screener_scraper.py

      - name: Run weekly analysis (Fridays + manual)
        run: |
          DAY=$(date +'%u')
          EVENT="${{ github.event_name }}"
          if [ "$DAY" = "5" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Running weekly analysis..."
            python weekly_analysis.py
          else
            echo "Not Friday — skipping weekly (day=$DAY)"
          fi

      - name: Run silent horse analysis (EVERY Friday + manual)
        run: |
          DAY=$(date +'%u')
          EVENT="${{ github.event_name }}"
          DOM=$(date +'%d')
          if [ "$DAY" = "5" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Running silent horse 3-week + 4-week windows..."
            python silent_horse.py
          else
            echo "Not Friday — skipping silent horse (day=$DAY)"
          fi

      - name: Run cleanup (Fridays only)
        run: |
          if [ "$(date +'%u')" = "5" ]; then
            echo "Running 180-day cleanup..."
            python cleanup.py
          fi

      - name: Send email (Fridays + Saturdays + manual)
        run: |
          DAY=$(date +'%u')
          EVENT="${{ github.event_name }}"
          if [ "$DAY" = "5" ] || [ "$DAY" = "6" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Sending email report..."
            python send_email.py
          fi
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📈 $(date +'%Y-%m-%d')$([ $(date +'%u') -eq 5 ] && echo ' + weekly + silent horse' || echo '')"
          git push
